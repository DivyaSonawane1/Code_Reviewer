<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CodeLens — AI Code Reviewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <style>
    :root {
      --bg: #0b0c10; --surface: #13141a; --border: #1e2028;
      --accent: #00e5ff; --text: #e2e4ec; --muted: #5a5f72;
      --green: #22d3a5; --red: #f87171; --yellow: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: #fff; }
    .logo span { color: var(--accent); }
    select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; outline: none; transition: border-color 0.2s; }
    select:focus { border-color: var(--accent); }
    .main { display: grid; grid-template-columns: 220px 1fr 1fr; flex: 1; overflow: hidden; position: relative; z-index: 1; }
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .history-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px; font-size: 13px; }
    .history-item:hover { background: var(--border); }
    .history-item.active { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.15); }
    .history-lang-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted); flex-shrink: 0; }
    .history-label { color: var(--text); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .history-menu-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 5px; border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; flex-shrink: 0; font-size: 16px; line-height: 1; }
    .history-item:hover .history-menu-btn { opacity: 1; }
    .history-menu-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .dropdown { position: fixed; background: #1a1b23; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 1000; min-width: 140px; overflow: hidden; animation: fadeUp 0.15s ease; }
    .dropdown-item { display: flex; align-items: center; gap: 8px; padding: 9px 14px; font-size: 13px; cursor: pointer; transition: background 0.12s; color: var(--text); }
    .dropdown-item:hover { background: var(--border); }
    .dropdown-item.danger { color: var(--red); }
    .dropdown-item.danger:hover { background: rgba(248,113,113,0.1); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal { background: #1a1b23; border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 320px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
    .modal h3 { font-family: 'Syne', sans-serif; font-size: 15px; margin-bottom: 14px; }
    .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .modal-btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; }
    .modal-btn.primary { background: var(--accent); color: #000; }
    .modal-btn.primary:hover { opacity: 0.85; }
    .modal-btn.secondary { background: var(--border); color: var(--muted); }
    .modal-btn.secondary:hover { color: var(--text); }
    .editor-pane { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .pane-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .pane-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    #editor { flex: 1; }
    .editor-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-review { background: linear-gradient(135deg, #00e5ff, #0099bb); color: #000; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px; padding: 9px 20px; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; gap: 6px; }
    .btn-review:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-review:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-clear:hover { color: var(--text); border-color: var(--muted); }
    .status-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-left: auto; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-pane { display: flex; flex-direction: column; overflow: hidden; }
    .result-scroll { flex: 1; overflow-y: auto; padding: 20px; }
    .result-scroll::-webkit-scrollbar { width: 4px; }
    .result-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); text-align: center; }
    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); opacity: 0.5; }
    .empty-state p { font-size: 13px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .rating-header { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; padding: 18px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; animation: fadeUp 0.3s ease; }
    .rating-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .rating-ring svg { transform: rotate(-90deg); }
    .rating-ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
    .rating-ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; }
    .rating-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; }
    .rating-info { flex: 1; }
    .rating-label { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .rating-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; animation: fadeUp 0.3s ease both; }
    .section-title { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.15s; }
    .section-title:hover { background: rgba(255,255,255,0.02); }
    .section-badge { margin-left: auto; background: var(--border); border-radius: 20px; padding: 2px 8px; font-size: 10px; color: var(--muted); }
    .section-chevron { margin-left: 4px; transition: transform 0.2s; color: var(--muted); }
    .section-card.collapsed .section-chevron { transform: rotate(-90deg); }
    .section-body { padding: 12px 16px; overflow: hidden; transition: max-height 0.25s ease, padding 0.25s ease; }
    .section-card.collapsed .section-body { max-height: 0 !important; padding-top: 0; padding-bottom: 0; }
    .issue-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; align-items: flex-start; }
    .issue-item:last-child { border-bottom: none; padding-bottom: 0; }
    .issue-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }
    .error-card { background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.2); border-radius: 12px; padding: 18px 20px; animation: fadeUp 0.3s ease; }
    .error-card strong { color: var(--red); font-size: 14px; display: block; margin-bottom: 6px; }
    .error-card p { font-size: 13px; line-height: 1.6; color: var(--muted); }
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .skeleton-line { height: 12px; margin-bottom: 8px; }
  </style>
</head>
<body>
<header class="header">
  <div class="logo">Code<span>Lens</span></div>
  <select id="language">
    <option value="Java">☕ Java</option>
    <option value="Python">🐍 Python</option>
    <option value="JavaScript">🟨 JavaScript</option>
    <option value="TypeScript">🔷 TypeScript</option>
    <option value="C++">⚡ C++</option>
    <option value="Go">🔵 Go</option>
  </select>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;">
      <span>History</span>
      <button onclick="deleteAll()" title="Delete all" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px;transition:color 0.15s,background 0.15s;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;" onmouseover="this.style.color='var(--red)';this.style.background='rgba(248,113,113,0.08)'" onmouseout="this.style.color='var(--muted)';this.style.background='none'">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear all
      </button>
    </div>
    <div class="sidebar-list" id="history">
      <div style="padding:20px 10px;text-align:center;color:var(--muted);font-size:12px;">No reviews yet</div>
    </div>
  </aside>

  <div class="editor-pane">
    <div class="pane-header"><span class="pane-title">Editor</span></div>
    <div id="editor"></div>
    <div class="editor-footer">
      <button class="btn-review" id="btn" onclick="review()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Review Code
      </button>
      <button class="btn-clear" onclick="clearEditor()">Clear</button>
      <div class="status-pill">
        <div class="spinner" id="spinner"></div>
        <span id="status"></span>
      </div>
    </div>
  </div>

  <div class="result-pane">
    <div class="pane-header">
      <span class="pane-title">Analysis</span>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
    </div>
    <div class="result-scroll" id="resultScroll">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔍</div>
        <h3>No review yet</h3>
        <p>Paste your code and hit Review</p>
      </div>
      <div id="result" style="display:none"></div>
    </div>
  </div>
</div>

<script>
let editor, lastReviewText = '';

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: '// Paste your code here and click Review Code\n',
    language: 'java', theme: 'vs-dark', automaticLayout: true,
    fontSize: 13, fontFamily: "'JetBrains Mono', monospace",
    minimap: { enabled: false }, scrollBeyondLastLine: false, padding: { top: 12 }
  });
});

document.getElementById('language').addEventListener('change', function () {
  const map = { Java:'java', Python:'python', JavaScript:'javascript', TypeScript:'typescript', 'C++':'cpp', Go:'go' };
  if (editor) monaco.editor.setModelLanguage(editor.getModel(), map[this.value] || 'plaintext');
});

function clearEditor() {
  if (editor) editor.setValue('// Paste your code here and click Review Code\n');
}

async function review() {
  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spinner');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const emptyState = document.getElementById('emptyState');
  const copyBtn = document.getElementById('copyBtn');

  btn.disabled = true;
  spinner.style.display = 'block';
  status.textContent = 'Reviewing…';
  copyBtn.style.display = 'none';
  emptyState.style.display = 'none';
  result.style.display = 'block';
  result.innerHTML = `
    <div class="skeleton-card"><div class="skeleton skeleton-line" style="width:40%;margin-bottom:16px"></div><div class="skeleton skeleton-line" style="width:90%"></div><div class="skeleton skeleton-line" style="width:70%"></div><div class="skeleton skeleton-line" style="width:80%"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-line" style="width:35%;margin-bottom:16px"></div><div class="skeleton skeleton-line" style="width:85%"></div><div class="skeleton skeleton-line" style="width:60%"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-line" style="width:45%;margin-bottom:16px"></div><div class="skeleton skeleton-line" style="width:75%"></div><div class="skeleton skeleton-line" style="width:90%"></div></div>`;

  try {
    const response = await fetch('/api/reviews', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: editor.getValue(), language: document.getElementById('language').value })
    });
    const data = await response.json();
    renderResult(data.review);
    status.textContent = '✓ Done';
    copyBtn.style.display = 'flex';
  } catch (e) {
    result.innerHTML = `<div class="error-card"><strong>⚠️ Request failed</strong><p>${e.message || 'Something went wrong. Please try again.'}</p></div>`;
    status.textContent = 'Failed';
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  loadHistory();
}

function renderResult(raw) {
  const result = document.getElementById('result');
  let parsed;
  try {
    const m = raw.match(/\{[\s\S]*\}/);
    parsed = JSON.parse(m ? m[0] : raw);
    lastReviewText = JSON.stringify(parsed, null, 2);
  } catch {
    lastReviewText = raw;
    result.innerHTML = renderPlainText(raw);
    return;
  }

  // Try multiple fields Gemini might use for rating
  const rating = Math.min(10, Math.max(0, Number(parsed.rating || parsed.score || parsed.grade || 0)));
  const color = rating >= 8 ? '#22d3a5' : rating >= 5 ? '#fbbf24' : '#f87171';
  const circ = 2 * Math.PI * 26;
  const offset = circ - (rating / 10) * circ;
  const label = rating >= 8 ? 'Great Code! 🎉' : rating >= 5 ? 'Needs Some Work' : 'Needs Attention';

  const sections = [
    { icon: '🐞', label: 'BUGS', color: '#f87171', items: parsed.bugs },
    { icon: '🔐', label: 'SECURITY', color: '#fbbf24', items: parsed.security },
    { icon: '⚡', label: 'PERFORMANCE', color: '#a78bfa', items: parsed.performance },
    { icon: '✨', label: 'IMPROVEMENTS', color: '#22d3a5', items: parsed.improvements },
  ];

  let html = `<div class="rating-header">
    <div class="rating-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="rating-ring-bg" cx="32" cy="32" r="26"/>
        <circle class="rating-ring-fill" cx="32" cy="32" r="26" stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <span class="rating-number" style="color:${color}">${rating}</span>
    </div>
    <div class="rating-info">
      <div class="rating-label">${label}</div>
      <div class="rating-summary">${renderMarkdown(parsed.summary || 'No summary provided.')}</div>
    </div>
  </div>`;

  sections.forEach(({ icon, label, color, items }, i) => {
    const list = Array.isArray(items) ? items : [];
    html += `<div class="section-card" style="animation-delay:${0.05 + i * 0.05}s">
      <div class="section-title" onclick="toggleSection(this)">
        <span>${icon} ${label}</span>
        <span class="section-badge">${list.length}</span>
        <span class="section-chevron">▾</span>
      </div>
      <div class="section-body" style="max-height:${list.length * 80 + 40}px">
        ${list.length === 0
          ? `<p style="color:var(--muted);font-size:13px;">No issues found ✓</p>`
          : list.map(item => `<div class="issue-item"><span class="issue-dot" style="background:${color}"></span><span>${renderMarkdown(item)}</span></div>`).join('')}
      </div>
    </div>`;
  });

  result.innerHTML = html;
}

function renderPlainText(raw) {
  // Convert markdown-style text into styled HTML blocks
  const lines = raw.split('\n');
  let html = '<div style="animation: fadeUp 0.3s ease">';
  let inList = false;

  for (let line of lines) {
    const trimmed = line.trim();
    if (!trimmed) {
      if (inList) { html += '</div>'; inList = false; }
      html += '<div style="height:8px"></div>';
      continue;
    }

    // **Bold header** lines (e.g. **Compilation Error:**)
    if (/^\*\*(.+)\*\*/.test(trimmed)) {
      if (inList) { html += '</div>'; inList = false; }
      const heading = trimmed.replace(/\*\*(.+?)\*\*/g, '$1');
      const icon = heading.toLowerCase().includes('bug') || heading.toLowerCase().includes('error') || heading.toLowerCase().includes('compil') ? '🐞'
                 : heading.toLowerCase().includes('security') ? '🔐'
                 : heading.toLowerCase().includes('performance') ? '⚡'
                 : heading.toLowerCase().includes('fix') || heading.toLowerCase().includes('improv') ? '✨'
                 : heading.toLowerCase().includes('runtime') ? '💥'
                 : '📌';
      html += `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent)">${icon} ${escapeHtml(heading)}</div>`;
      continue;
    }

    // Bullet points: lines starting with - or *
    if (/^[-*]\s+/.test(trimmed)) {
      if (!inList) {
        html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px">';
        inList = true;
      }
      const text = trimmed.replace(/^[-*]\s+/, '').replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
      html += `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6;align-items:flex-start">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0"></span>
        <span style="color:var(--text)">${text}</span>
      </div>`;
      continue;
    }

    // Regular paragraph text
    if (inList) { html += '</div>'; inList = false; }
    const formatted = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
    html += `<p style="font-size:13px;line-height:1.7;color:var(--muted);margin-bottom:6px;padding:0 2px">${formatted}</p>`;
  }

  if (inList) html += '</div>';
  html += '</div>';
  return html;
}

function toggleSection(el) { el.closest('.section-card').classList.toggle('collapsed'); }
function renderMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text);font-weight:600">$1</strong>')
    .replace(/`(.+?)`/g, '<code style="font-family:JetBrains Mono,monospace;font-size:12px;background:var(--border);padding:1px 5px;border-radius:4px">$1</code>');
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function copyResult() {
  const btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(lastReviewText);
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`; }, 2000);
  } catch {}
}

// Store custom labels in memory (persists until page refresh)
const customLabels = {};

async function loadHistory() {
  try {
    const res = await fetch('/api/reviews');
    const data = await res.json();
    const el = document.getElementById('history');
    if (!data.length) { el.innerHTML = `<div style="padding:20px 10px;text-align:center;color:var(--muted);font-size:12px;">No reviews yet</div>`; return; }
    el.innerHTML = [...data].reverse().map(item => {
      const label = customLabels[item.id] || `#${item.id} — ${item.language}`;
      return `<div class="history-item" onclick="loadReview(${item.id})" data-id="${item.id}">
        <span class="history-lang-badge">${(item.language||'?').slice(0,2).toUpperCase()}</span>
        <span class="history-label">${escapeHtml(label)}</span>
        <button class="history-menu-btn" onclick="openMenu(event, ${item.id})" title="Options">⋯</button>
      </div>`;
    }).join('');
  } catch {}
}

// --- Dropdown menu ---
let activeDropdown = null;

function openMenu(e, id) {
  e.stopPropagation();
  closeDropdown();

  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();

  const menu = document.createElement('div');
  menu.className = 'dropdown';
  menu.id = 'activeDropdown';
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
  menu.innerHTML = `
    <div class="dropdown-item" onclick="openRename(${id})">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Rename
    </div>
    <div class="dropdown-item danger" onclick="deleteReview(${id})">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      Delete
    </div>`;
  document.body.appendChild(menu);
  activeDropdown = menu;

  setTimeout(() => document.addEventListener('click', closeDropdown, { once: true }), 0);
}

function closeDropdown() {
  const d = document.getElementById('activeDropdown');
  if (d) d.remove();
  activeDropdown = null;
}

// --- Rename ---
function openRename(id) {
  closeDropdown();
  const current = customLabels[id] || `#${id}`;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Rename Review</h3>
      <input id="renameInput" type="text" value="${escapeHtml(current)}" placeholder="Enter a name..." maxlength="40" />
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
        <button class="modal-btn primary" onclick="confirmRename(${id})">Save</button>
      </div>
    </div>`;
  overlay.id = 'modalOverlay';
  overlay.onclick = closeModal;
  document.body.appendChild(overlay);
  const input = document.getElementById('renameInput');
  input.focus();
  input.select();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') confirmRename(id); if (e.key === 'Escape') closeModal(); });
}

function confirmRename(id) {
  const val = document.getElementById('renameInput')?.value.trim();
  if (val) customLabels[id] = val;
  closeModal();
  loadHistory();
}

function closeModal() {
  document.getElementById('modalOverlay')?.remove();
}

// --- Delete ---
async function deleteReview(id) {
  closeDropdown();
  try {
    await fetch('/api/reviews/' + id, { method: 'DELETE' });
    delete customLabels[id];
    // If the deleted item was active, clear the result pane
    const active = document.querySelector('.history-item.active');
    if (active && Number(active.dataset.id) === id) {
      document.getElementById('result').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('copyBtn').style.display = 'none';
    }
    loadHistory();
  } catch {}
}

async function loadReview(id) {
  try {
    const res = await fetch('/api/reviews');
    const data = await res.json();
    const item = data.find(r => r.id === id);
    if (!item) return;
    if (editor) editor.setValue(item.code || '');
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('copyBtn').style.display = 'flex';
    renderResult(item.review);
    document.querySelectorAll('.history-item').forEach(el => el.classList.toggle('active', Number(el.dataset.id) === id));
  } catch {}
}

async function deleteAll() {
  const el = document.getElementById('history');
  if (!el.querySelector('.history-item')) return;

  // Confirm
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Delete All Reviews?</h3>
      <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:4px;">This will permanently remove all history. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
        <button class="modal-btn primary" style="background:var(--red);color:#fff" onclick="confirmDeleteAll()">Delete All</button>
      </div>
    </div>`;
  overlay.onclick = closeModal;
  document.body.appendChild(overlay);
}

async function confirmDeleteAll() {
  closeModal();
  try {
    const res = await fetch('/api/reviews');
    const data = await res.json();
    await Promise.all(data.map(item => fetch('/api/reviews/' + item.id, { method: 'DELETE' })));
    Object.keys(customLabels).forEach(k => delete customLabels[k]);
    document.getElementById('result').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('copyBtn').style.display = 'none';
    loadHistory();
  } catch {}
}

window.onload = loadHistory;
</script>
</body>
</html>
